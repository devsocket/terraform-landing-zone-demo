name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'shared/monitoring/log_analytics/**'
      - 'shared/acr/**'
      - 'shared/key_vault/**'
      - 'shared/storage/**'
      - 'connectivity/hub/**'
      - 'connectivity/spokes/**'
      - 'connectivity/private-dns/**'
      - 'apps/sample-app/dev/appgw/**'
      - 'apps/sample-app/dev/aks/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"
  TFSTATE_RG: ${{ vars.TFSTATE_RG }}
  TFSTATE_SA: ${{ vars.TFSTATE_SA }}
  TF_VERSION: ${{ vars.TF_VERSION }}

jobs:

  detect-changes:
    name: Detect Changed Layers
    runs-on: ubuntu-latest
    outputs:
      log_analytics: ${{ steps.filter.outputs.log_analytics }}
      hub: ${{ steps.filter.outputs.hub }}
      spoke_dev: ${{ steps.filter.outputs.spoke_dev }}
      private_dns: ${{ steps.filter.outputs.private_dns }}
      acr: ${{ steps.filter.outputs.acr }}
      key_vault: ${{ steps.filter.outputs.key_vault }}
      storage: ${{ steps.filter.outputs.storage }}
      appgw: ${{ steps.filter.outputs.appgw }}
      aks: ${{ steps.filter.outputs.aks }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            log_analytics:
              - 'shared/monitoring/log_analytics/**'
            hub:
              - 'connectivity/hub/**'
            spoke_dev:
              - 'connectivity/spokes/dev/**'
            private_dns:
              - 'connectivity/private-dns/**'
            acr:
              - 'shared/acr/**'
            key_vault:
              - 'shared/key_vault/**'
            storage:
              - 'shared/storage/**'
            appgw:
              - 'apps/sample-app/dev/appgw/**'
            aks:
              - 'apps/sample-app/dev/aks/**'

  plan-log-analytics:
    name: Plan / shared/monitoring/log_analytics
    needs: detect-changes
    if: needs.detect-changes.outputs.log_analytics == 'true'
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.PLATFORM_SUB_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLATFORM_SUB_ID }}

      - name: Terraform Init
        working-directory: shared/monitoring/log_analytics
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${{ env.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ env.TFSTATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="subscription_id=${{ secrets.PLATFORM_SUB_ID }}"

      - name: Terraform Plan
        id: plan
        working-directory: shared/monitoring/log_analytics
        run: |
          terraform plan -input=false -no-color 2>&1 | tee /tmp/plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 65000
              ? plan.substring(0, 65000) + '\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Plan: \`shared/monitoring/log_analytics\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

